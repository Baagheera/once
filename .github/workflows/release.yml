name: release

on:
  release:
    types: [created]
  workflow_dispatch:
    inputs:
      tag:
        description: Tag to package, such as v0.5.0
        required: true

permissions:
  contents: read

jobs:
  build:
    name: build-artifacts
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.tag }}

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version: 1.26.x
          cache: true
      - name: Choose tag
        id: tag
        shell: bash
        env:
          DISPATCH_TAG: ${{ inputs.tag }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            tag="$DISPATCH_TAG"
          elif [ "${{ github.event_name }}" = "release" ]; then
            tag="${{ github.event.release.tag_name }}"
          else
            echo "unsupported event" >&2
            exit 1
          fi
          if ! printf '%s\n' "$tag" | grep -Eq '^v[0-9]+[.][0-9]+[.][0-9]+$'; then
            echo "release tag must look like v0.5.0" >&2
            exit 1
          fi
          git show-ref --verify --quiet "refs/tags/$tag"
          printf 'tag=%s\n' "$tag" >> "$GITHUB_OUTPUT"
      - name: Check out tag
        run: git checkout --detach "${{ steps.tag.outputs.tag }}"
      - name: Build artifacts
        run: python scripts/build_release_artifacts.py "${{ steps.tag.outputs.tag }}"
      - name: Upload artifact bundle
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: release-dist
          path: dist/*
          if-no-files-found: error

  publish:
    name: publish-release
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@018cc2cf5baa6db3ef3c5f8a56943fffe632ef53 # v6
        with:
          name: release-dist
          path: dist
      - name: Upload artifacts to release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.build.outputs.tag }}
        shell: bash
        run: |
          gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null
          gh release upload "$TAG" dist/* --repo "$GITHUB_REPOSITORY"
