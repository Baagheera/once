name: release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: Tag to package, such as v0.5.0
        required: true

permissions:
  contents: read

concurrency:
  group: release-${{ github.event_name == 'release' && github.event.release.tag_name || inputs.tag }}
  cancel-in-progress: false

jobs:
  build:
    name: build-artifacts
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      attestations: write
    outputs:
      tag: ${{ steps.tag.outputs.tag }}

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
      - run: python scripts/verify_workflow_toolchains.py
      - name: Choose tag
        id: tag
        shell: bash
        env:
          DISPATCH_TAG: ${{ inputs.tag }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          if [ "$GITHUB_EVENT_NAME" = "workflow_dispatch" ]; then
            tag="$DISPATCH_TAG"
          elif [ "$GITHUB_EVENT_NAME" = "release" ]; then
            tag="$RELEASE_TAG"
          else
            echo "unsupported event" >&2
            exit 1
          fi
          if ! printf '%s\n' "$tag" | grep -Eq '^v[0-9]+[.][0-9]+[.][0-9]+$'; then
            echo "release tag must look like v0.5.0" >&2
            exit 1
          fi
          git fetch --force origin main:refs/remotes/origin/main
          if ! tag_commit="$(git rev-parse -q --verify "refs/tags/$tag^{commit}")"; then
            echo "release tag does not exist: $tag" >&2
            exit 1
          fi
          if ! git merge-base --is-ancestor "$tag_commit" origin/main; then
            echo "release tag must point to a commit reachable from origin/main" >&2
            exit 1
          fi
          printf 'tag=%s\n' "$tag" >> "$GITHUB_OUTPUT"
      - name: Check out tag
        run: git checkout --detach "${{ steps.tag.outputs.tag }}"
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version: 1.26.5
          cache: true
      - name: Scan Go vulnerabilities
        run: go run golang.org/x/vuln/cmd/govulncheck@v1.5.0 ./...
      - name: Build artifacts
        run: python scripts/build_release_artifacts.py "${{ steps.tag.outputs.tag }}"
      - name: Verify artifacts
        run: python scripts/verify_release_artifacts.py "${{ steps.tag.outputs.tag }}"
      - name: Generate artifact attestations
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: dist/*
      - name: Upload artifact bundle
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-dist
          path: dist/*
          if-no-files-found: error

  publish:
    name: publish-release
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-dist
          path: dist
      - name: Upload artifacts to release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.build.outputs.tag }}
        shell: bash
        run: |
          gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null
          gh release upload "$TAG" dist/* --repo "$GITHUB_REPOSITORY" --clobber
