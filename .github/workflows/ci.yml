name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version: 1.26.x
          cache: true
      - if: matrix.os == 'ubuntu-latest'
        run: go run github.com/zricethezav/gitleaks/v8@v8.30.1 detect --source . --no-git --redact --exit-code 1
      - run: go test ./...
      - run: go vet ./...
      - run: go run golang.org/x/vuln/cmd/govulncheck@v1.5.0 ./...
      - run: go build ./cmd/once
      - if: matrix.os == 'ubuntu-latest'
        run: sh examples/demo.sh

  minimum-go:
    name: ubuntu-latest-go1.25
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version: 1.25.x
          cache: true
      - run: go test ./...
      - run: go vet ./...
      - run: go build ./cmd/once
